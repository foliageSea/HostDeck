<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HostDeck</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        user-select: none;
        background: #0f172a;
      }

      .shell {
        display: grid;
        min-height: 100vh;
        place-items: center;
        -webkit-app-region: drag;
      }

      .loading {
        text-align: center;
      }

      .spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto 20px;
        border: 3px solid rgba(148, 163, 184, 0.22);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      p {
        margin: 8px 0 0;
        color: #94a3b8;
        font-size: 14px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="loading" aria-label="应用正在启动">
        <div class="spinner" aria-hidden="true"></div>
        <h1>HostDeck</h1>
        <p>正在启动...</p>
      </section>
    </main>
  </body>
</html>
