name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: |
          cd ssh-tool-ui
          npm install -g pnpm
          pnpm install
      - name: Build Web
        run: |
          cd ssh-tool-ui
          pnpm build
      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: ssh-tool-ui/dist

  build-dart-windows:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ssh-tool-ui/dist
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: dart build cli --target bin/server.dart -o build/server
      - run: |
          New-Item -ItemType Directory -Path build\server\bundle\web -Force
          Copy-Item -Path ssh-tool-ui\dist\* -Destination build\server\bundle\web -Recurse
      - name: Package Dart Windows Bundle
        run: Compress-Archive -Path build\server\bundle\* -DestinationPath ssh-tool-dart-windows-${{ github.ref_name }}.zip
      - name: Upload Dart Windows Bundle
        uses: softprops/action-gh-release@v1
        with:
          files: ssh-tool-dart-windows-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-dart-linux:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ssh-tool-ui/dist
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: dart build cli --target bin/server.dart -o build/server
      - run: |
          mkdir -p build/server/bundle/web
          cp -R ssh-tool-ui/dist/. build/server/bundle/web/
      - name: Package Dart Linux Bundle
        run: tar -czf ssh-tool-dart-linux-${{ github.ref_name }}.tar.gz -C build/server/bundle .
      - name: Upload Dart Linux Bundle
        uses: softprops/action-gh-release@v1
        with:
          files: ssh-tool-dart-linux-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-dart-macos:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ssh-tool-ui/dist
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: dart build cli --target bin/server.dart -o build/server
      - run: |
          mkdir -p build/server/bundle/web
          cp -R ssh-tool-ui/dist/. build/server/bundle/web/
      - name: Package Dart MacOS Bundle
        run: tar -czf ssh-tool-dart-macos-${{ github.ref_name }}.tar.gz -C build/server/bundle .
      - name: Upload Dart MacOS Bundle
        uses: softprops/action-gh-release@v1
        with:
          files: ssh-tool-dart-macos-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image namespace
        id: image
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner_lc }}/ssh-tool:${{ github.ref_name }}
            ghcr.io/${{ steps.image.outputs.owner_lc }}/ssh-tool:latest

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: assets/web
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.2'
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk ssh-tool-android-${{ github.ref_name }}.apk
      - name: Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: ssh-tool-android-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: assets/web
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Archive Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ssh-tool-windows-${{ github.ref_name }}.zip
      - name: Upload Windows
        uses: softprops/action-gh-release@v1
        with:
          files: ssh-tool-windows-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: assets/web
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Archive Linux Build
        run: tar -czf ssh-tool-linux-${{ github.ref_name }}.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload Linux
        uses: softprops/action-gh-release@v1
        with:
          files: ssh-tool-linux-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: assets/web
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Archive MacOS Build
        run: ditto -c -k --keepParent build/macos/Build/Products/Release/ssh_tool.app ssh-tool-macos-${{ github.ref_name }}.zip
      - name: Upload MacOS
        uses: softprops/action-gh-release@v1
        with:
          files: ssh-tool-macos-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
