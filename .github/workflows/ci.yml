name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dart:
    name: Dart and Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.2'
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm --dir host-deck-ui install --frozen-lockfile
      - run: pnpm --dir host-deck-ui exec vue-tsc -p tsconfig.app.json --noEmit
      - run: pnpm --dir host-deck-ui test
      - run: pnpm --dir host-deck-ui build
